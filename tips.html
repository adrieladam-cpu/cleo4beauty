<h1>Our Products</h1>
<div class="product-grid">
  <div class="product-card">
    <img src="images/foundation.jpg" alt="Foundation">
    <h3>Foundation</h3>
    <p>RM45</p>
    <button onclick="addToCart('Foundation', 45)">Add to Cart</button>
  </div>
  <div class="product-card">
    <img src="images/lipstick.jpg" alt="Lipstick">
    <h3>Lipstick</h3>
    <p>RM30</p>
    <button onclick="addToCart('Lipstick', 30)">Add to Cart</button>
  </div>
  <div class="product-card">
    <img src="images/blusher.jpg" alt="Blusher">
    <h3>Blusher</h3>
    <p>RM25</p>
    <button onclick="addToCart('Blusher', 25)">Add to Cart</button>
  </div>
</div>

<script>
function addToCart(name, price){
  alert(name + " added to cart! Price: RM" + price);
}
</script>
